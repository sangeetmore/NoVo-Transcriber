<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">Note It logo</title>
  <desc id="desc">A black and orange Note It wordmark with the tagline Watch any video. Get clean notes.</desc>
  <rect width="900" height="260" rx="36" fill="#050505"/>
  <rect x="18" y="18" width="864" height="224" rx="28" fill="#0e0e10" stroke="#26262e" stroke-width="2"/>
  <g transform="translate(450 110)">
    <text x="-72" y="0" text-anchor="end" fill="#ff6b1a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" letter-spacing="-2">note</text>
    <rect x="-39" y="-50" width="78" height="78" rx="14" fill="#ff8642" transform="rotate(45)"/>
    <text x="0" y="8" text-anchor="middle" fill="#050505" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="900">?</text>
    <text x="72" y="0" text-anchor="start" fill="#ff6b1a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" letter-spacing="-2">it</text>
  </g>
  <text x="450" y="174" text-anchor="middle" fill="#f5f5f7" opacity="0.82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="500">
    Watch any video. Get clean notes.
  </text>
</svg>
